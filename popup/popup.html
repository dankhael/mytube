<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyTube</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 340px;
        font-family: Roboto, system-ui, sans-serif;
        background: #0f0f0f;
        color: #f1f1f1;
      }
      header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 14px 16px;
        border-bottom: 1px solid #272727;
      }
      header .logo { color: #ff0000; font-weight: 700; font-size: 18px; }
      header .total { margin-left: auto; font-size: 12px; color: #aaa; }

      ul { list-style: none; margin: 0; padding: 6px; max-height: 440px; overflow-y: auto; }
      li.cat { border-radius: 8px; }

      /* Category header row (clickable, toggles the panel). */
      .cat-row {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        padding: 9px 10px;
        background: transparent;
        border: 0;
        border-radius: 8px;
        color: #f1f1f1;
        font-size: 14px;
        cursor: pointer;
        text-align: left;
      }
      .cat-row:hover { background: #1a1a1a; }
      .cat-name { font-weight: 500; }
      .cat-count {
        margin-left: auto;
        background: #272727;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 12px;
      }
      .chev { color: #aaa; font-size: 11px; width: 12px; text-align: center; }

      /* Expandable panel — hidden until the category is open. */
      .cat-videos { display: none; padding: 2px 6px 8px; }
      li.cat.open .cat-videos { display: block; }
      .cat-empty { color: #888; font-size: 12px; padding: 6px 8px; }

      /* Video item. */
      .vid {
        display: flex;
        gap: 10px;
        width: 100%;
        padding: 6px;
        background: transparent;
        border: 0;
        border-radius: 8px;
        cursor: pointer;
        text-align: left;
      }
      .vid:hover { background: #1a1a1a; }
      .vid-thumb {
        width: 92px;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        border-radius: 6px;
        flex-shrink: 0;
        background: #272727;
      }
      .vid-meta { min-width: 0; }
      .vid-title {
        color: #f1f1f1;
        font-size: 13px;
        line-height: 1.25;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .vid-channel {
        color: #aaa;
        font-size: 12px;
        margin-top: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .more-link {
        width: 100%;
        background: transparent;
        border: 0;
        color: #3ea6ff;
        font-size: 13px;
        text-align: left;
        padding: 8px;
        cursor: pointer;
      }
      .more-link:hover { text-decoration: underline; }

      .empty { padding: 24px 16px; text-align: center; color: #aaa; font-size: 13px; }

      footer { padding: 12px 16px; border-top: 1px solid #272727; }
      #open {
        width: 100%;
        padding: 10px;
        border: 0;
        border-radius: 999px;
        background: #ff0000;
        color: #fff;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
      }
      #open:hover { background: #cc0000; }
    </style>
  </head>
  <body>
    <header>
      <span class="logo">▶ MyTube</span>
      <span class="total" id="total"></span>
    </header>
    <ul id="list"></ul>
    <footer>
      <button id="open">Abrir minha home</button>
    </footer>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
