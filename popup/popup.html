<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyTube</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 300px;
        font-family: Roboto, system-ui, sans-serif;
        background: #0f0f0f;
        color: #f1f1f1;
      }
      header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 14px 16px;
        border-bottom: 1px solid #272727;
      }
      header .logo { color: #ff0000; font-weight: 700; font-size: 18px; }
      header .total { margin-left: auto; font-size: 12px; color: #aaa; }
      ul { list-style: none; margin: 0; padding: 8px; max-height: 320px; overflow-y: auto; }
      li {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 8px;
        font-size: 14px;
      }
      li:hover { background: #1a1a1a; }
      li .count {
        margin-left: auto;
        background: #272727;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 12px;
        color: #f1f1f1;
      }
      .empty { padding: 24px 16px; text-align: center; color: #aaa; font-size: 13px; }
      footer { padding: 12px 16px; border-top: 1px solid #272727; }
      button {
        width: 100%;
        padding: 10px;
        border: 0;
        border-radius: 999px;
        background: #ff0000;
        color: #fff;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
      }
      button:hover { background: #cc0000; }
    </style>
  </head>
  <body>
    <header>
      <span class="logo">▶ MyTube</span>
      <span class="total" id="total"></span>
    </header>
    <ul id="list"></ul>
    <footer>
      <button id="open">Abrir minha home</button>
    </footer>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
